name: Terraform CI

on:
  pull_request:
    paths:
      - 'terraform/**'
      - 'anomaly_detector/**'
      - 'tests/**'

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: terraform fmt
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: terraform init
        run: terraform init -backend=false
        working-directory: terraform

      - name: terraform validate
        run: terraform validate
        working-directory: terraform

  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install
        run: pip install ".[dev]"

      - name: ruff
        run: ruff check .

      - name: pytest
        run: pytest -v
